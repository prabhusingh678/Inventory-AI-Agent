<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Inventory AI Agent</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 420px;
            height: 600px;
            background: white;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header {
            background: #4f46e5;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #f9fafb;
        }

        .message {
            margin: 10px 0;
            padding: 10px 14px;
            border-radius: 10px;
            max-width: 75%;
            word-wrap: break-word;
        }

        .user {
            background: #4f46e5;
            color: white;
            margin-left: auto;
            text-align: right;
        }

        .ai {
            background: #e5e7eb;
            color: black;
            margin-right: auto;
        }

        .input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
            background: white;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            background: #4f46e5;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #4338ca;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="header">🤖 Inventory AI Agent</div>

    <div class="chat-box" id="chat"></div>

    <div class="input-area">
        <input id="question" placeholder="Ask about inventory..." />
        <button onclick="askAgent()">Send</button>
    </div>
</div>

<script src="app.js"></script>

</body>
</html>
